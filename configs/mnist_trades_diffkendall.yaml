# TRADES + DiffKendall on MNIST
seed: 123

data:
  name: mnist
  batch_size: 64
  num_workers: 2

model:
  name: mnist_cnn

train:
  epochs: 10
  lr: 0.0001
  optimizer: adam
  weight_decay: 0.0
  adv_method: trades         # TRADES: CE(f(x),y) + beta*KL(f(x)||f(x_adv))
  adv_beta: 6.0
  save_path: "artifacts/mnist_trades_diff_kendall.pt"

attack:
  eps: 0.3
  steps: 3
  step_size: 0.01

igr:
  enabled: true
  regularizer: diff_kendall  # tanh approximation of Kendall tau
  lambda_igr: 1.0
  ig_steps: 3
  use_abs_attr: false
  diff_kendall_alpha: 20.0   # steepness of tanh
  diff_kendall_pairs: 5000   # num sampled pairs for tau estimation

eval:
  n_samples: 200
  only_correct: true
  ig_steps: 50
  attack:
    eps: 0.3
    steps: 200
    step_size: 0.01
    restarts: 5
    k: 100
    cls_weight: 1.0
    proxy: cosine
    ig_steps_attack: 5

metrics:
  kendall_pairs: 10000

amp:
  enabled: false
