amp:
  enabled: false
attack:
  eps: 0.3
  step_size: 0.075
  steps: 7
data:
  batch_size: 64
  name: fashion_mnist
  num_workers: 2
eval:
  attack:
    cls_weight: 1.0
    eps: 0.3
    ig_steps_attack: 5
    k: 100
    proxy: cosine
    restarts: 5
    step_size: 0.01
    steps: 200
  ig_steps: 50
  n_samples: 200
  only_correct: true
igr:
  combo_w1: 0.5
  combo_w2: 0.5
  diff_kendall_alpha: 20.0
  diff_kendall_pairs: 5000
  enabled: true
  ig_steps: 3
  lambda_igr: 1.0
  regularizer: cosine
  soft_spearman_beta: 10.0
  soft_spearman_max_dim: 200
  use_abs_attr: false
metrics:
  kendall_pairs: 10000
model:
  name: mnist_cnn
seed: 123
train:
  adv_beta: 6.0
  adv_method: trades
  epochs: 12
  grad_clip: 0.0
  lr: 0.0001
  optimizer: adam
  save_path: artifacts/fashion_mnist_trades_cosine.pt
  warmup_epochs: 0
  weight_decay: 0.0
